<h2>Fires favorites</h2>

<!-- Si no hay favoritos, muestra un mensaje -->
@if (favoriteFairs.length === 0) {
<p>No hi ha fires favorites guardades.</p>
}

<!-- Si hay favoritos, muestra la lista -->
@if (favoriteFairs.length > 0) {
    <!-- Lista de ferias favoritas -->
    @for (fair of favoriteFairs; track fair.activityId) {
    <app-fair-card
        [fair]="fair"
        [isFavorite]="true"
        (favoriteClicked)="removeFavorite(fair)">
    </app-fair-card>
    }
}
