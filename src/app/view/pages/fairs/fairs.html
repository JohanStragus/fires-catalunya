<div class="fairs-page">

    <!-- Contenido principal -->
    <div class="fairs-content">

        <h2>Selecciona una comarca</h2>

        <!-- Zona del selector y botón de favoritos -->
        <div class="top-controls">

            <!-- El selector de comarcas -->
            <select #selector (change)="selectRegion(selector.value)">
                <option value="">-- Selecciona --</option>

                <!-- Opciones de comarcas -->
                @for (region of regions; track region) {
                <option [value]="region">
                    {{ region }}
                </option>
                }
            </select>

            <!-- Botón para mostrar u ocultar el panel de favoritos -->
            <button (click)="toggleFavoritesPanel()">
                <!-- Si está visible -->
                @if (showFavoritesPanel) {
                <!-- Mostrar botón para ocultar favoritos -->
                Amagar favorits
                } 
                <!-- Sí no está visible -->
                @else {
                <!-- Mostrar botón para mostrar favoritos -->
                Mostrar favorits
                }

                <!-- Contador -->
                <span class="badge">
                    {{ getFavoritesCount() }}
                </span>
            </button>

        </div>

        <!-- Si no se ha seleccionado una comarca, muestra un mensaje -->
        @if (!selectedRegion) {
        <p>Selecciona una comarca</p>
        }

        <!-- Separador -->
        <hr>

        <h2>Llistat de fires</h2>

        <!-- Lista de tarjetas de ferias -->
        @for (fair of filteredFairs; track fair.activityId) {
        <app-fair-card [fair]="fair" [isFavorite]="isFavorite(fair)" (favoriteClicked)="toggleFavorite(fair)">
        </app-fair-card>
        }

    </div>

    <!-- Panel lateral de favoritos -->
    @if (showFavoritesPanel) {
    <app-favorites-panel></app-favorites-panel>
    }

</div>
